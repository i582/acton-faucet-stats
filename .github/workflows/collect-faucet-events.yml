name: collect-faucet-events

on:
  schedule:
    - cron: "7 * * * *"
  workflow_dispatch:

concurrency:
  group: faucet-events
  cancel-in-progress: false

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  collect:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Collect events
        run: node scripts/collect.mjs
        env:
          TONCENTER_API_KEY: ${{ secrets.TONCENTER_API_KEY }}

      - name: Commit data
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add data
          git diff --cached --quiet || git commit -m "Update faucet events"
          git push origin HEAD:${{ github.ref_name }}

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Build static site
        run: |
          mkdir -p _site/data
          cp index.html app.js _site/
          cp data/events.jsonl _site/data/events.jsonl
          cp data/recipients.json _site/data/recipients.json

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
